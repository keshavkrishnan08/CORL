[pytest]
# Silence third-party deprecation noise (matplotlib's internal pyparsing calls on some
# environments, e.g. Kaggle). These are not from this project's code.
filterwarnings =
    ignore::DeprecationWarning:matplotlib.*
    ignore::DeprecationWarning:pyparsing.*
    ignore:.*pyparsing.*:DeprecationWarning
testpaths = tests
