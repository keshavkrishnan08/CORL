# DRC TMLR 2026 — task definitions (reduced scope).
# Three LIBERO tasks spanning the horizon axis (short/medium/long) on one benchmark,
# one robot — so the horizon-wall effect is isolated, not confounded by benchmark.
# held_out drives the H4 split (extrapolation to the longest horizon).

tasks:
  LIBERO-Spatial-1:
    suite: libero
    benchmark: libero_spatial
    task_id: 0
    bddl: pick_up_the_black_bowl_between_the_plate_and_the_ramekin_and_place_it_on_the_plate
    horizon: short          # {short, medium, long}
    complexity: low         # {low, medium, high}
    n_demos: 50
    max_steps: 200
    held_out: false

  LIBERO-Goal-1:
    suite: libero
    benchmark: libero_goal
    task_id: 0
    bddl: open_the_middle_drawer_of_the_cabinet
    horizon: medium
    complexity: medium
    n_demos: 50
    max_steps: 500
    held_out: false

  LIBERO-Long-1:
    suite: libero
    benchmark: libero_10        # libero_long ships as libero_10
    task_id: 0
    bddl: put_both_the_alphabet_soup_and_the_tomato_sauce_in_the_basket
    horizon: long
    complexity: high
    n_demos: 50
    max_steps: 800
    held_out: true             # H4 held-out: extrapolate the composite to the longest horizon
